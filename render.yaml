services:
  - type: web
    name: malware-generator
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind :$PORT --workers 4 main:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: malware-db
          property: connectionString
databases:
  - name: malware-db
    plan: free
